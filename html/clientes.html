<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Clientes</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/clientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <aside class="sidebar">
        <div class="logo">
            <img src="../imagens/gifbarber.gif" alt="Logo animada">
            <span>Guia</span>
        </div>

        <nav>
            <a href="paginainicial.html">Página Inicial</a>
            <a href="servicos.html">Serviços</a>
            <a href="clientes.html" class="active">Clientes</a>
            <a href="agendamentos.html">Agendamentos</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </aside>

    <main class="main">

        <header class="topbar">
            <h1>Barbearia Senai</h1>
            <span class="sub-text">Gerencie seus clientes aqui!</span>
        </header>

        <section class="cards">

            <!-- CARD ADICIONAR -->
            <div class="card adicionar-cliente">
                <h3><i class="fa-solid fa-user-plus"></i> Adicionar Cliente</h3>

                <div class="form-group">

                    <div class="form-section span-12">
                        <h4>Dados Pessoais</h4>
                        <div class="section-divider"></div>
                    </div>

                    <div class="input-wrap span-12">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Ex: João da Silva">
                    </div>

                    <div class="input-wrap span-6">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00">
                    </div>

                    <div class="input-wrap span-6">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                    </div>

                    <div class="input-wrap span-6">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="nome@email.com">
                    </div>

                    <div class="input-wrap span-3">
                        <label for="dataNascimento">Nascimento</label>
                        <input type="date" id="dataNascimento">
                    </div>

                    <div class="input-wrap span-3">
                        <label for="genero">Gênero</label>
                        <input type="text" id="genero" placeholder="Masculino/Feminino">
                    </div>

                    <div class="form-section span-12">
                        <h4>Endereço Residencial</h4>
                        <div class="section-divider"></div>
                    </div>

                    <div class="input-wrap span-4">
                        <label for="endereco">Endereco</label>
                        <input type="String" id="endereco" placeholder="Rua tal, numero tal" maxlength="200">
                   
                    </div>

                </div>

                <button class="btn-maps" onclick="salvarCliente()">Salvar Cliente</button>
            </div>

            <!-- CARD GERENCIAR -->
            <div class="card gerenciar-cliente">
                <h3><i class="fa-solid fa-users-gear"></i> Gerenciar Clientes</h3>
                <div class="table-container active">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Id</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                        <tbody id="lista-clientes"></tbody>
                    </table>
                </div>


                <div class="empty-state">
                    <i class="fa-solid fa-user-slash"></i>
                    <p>Nenhum cliente cadastrado no momento.</p>
                    <span>Os clientes que você adicionar aparecerão aqui.</span>
                </div>

            </div>

        </section>
    </main>

    <!-- SCRIPT CORRETO -->
    <script type="module" src="../js/clientes.js"></script>


</body>

</html>
